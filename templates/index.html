<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bible Word Study — Genesis LXX</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f5f4f0;
      color: #1a1a1a;
      min-height: 100vh;
    }

    header {
      background: #2c3e50;
      color: #fff;
      padding: 1.25rem 2rem;
    }
    header h1 { font-size: 1.25rem; font-weight: 600; }
    header p  { font-size: 0.8rem; color: #94a3b8; margin-top: 0.2rem; }

    main { max-width: 780px; margin: 0 auto; padding: 2rem 1rem; }

    /* ── Search bar ── */
    .search-row {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }
    #q {
      flex: 1;
      padding: 0.6rem 0.9rem;
      font-size: 1rem;
      border: 1.5px solid #cbd5e1;
      border-radius: 6px;
      outline: none;
      transition: border-color 0.15s;
    }
    #q:focus { border-color: #3b82f6; }

    .search-row button {
      padding: 0.6rem 1.2rem;
      background: #2c3e50;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    .search-row button:hover { background: #3b82f6; }

    .options-row {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      margin-top: 0.6rem;
      font-size: 0.85rem;
      color: #475569;
    }
    .options-row input[type=checkbox] { accent-color: #3b82f6; }

    /* ── Summary ── */
    #summary {
      margin: 1.25rem 0 0.75rem;
      font-size: 0.85rem;
      color: #64748b;
      min-height: 1.2em;
    }

    /* ── Result cards ── */
    .card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      margin-bottom: 0.6rem;
      overflow: hidden;
      transition: box-shadow 0.15s;
    }
    .card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.07); }

    .card-header {
      display: flex;
      align-items: baseline;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      cursor: pointer;
      user-select: none;
    }

    .ref {
      font-weight: 600;
      color: #1e3a5f;
      white-space: nowrap;
      min-width: 7rem;
      font-size: 0.9rem;
    }
    .strongs-tag {
      font-size: 0.78rem;
      background: #eff6ff;
      color: #1d4ed8;
      border: 1px solid #bfdbfe;
      border-radius: 4px;
      padding: 0.1rem 0.45rem;
      white-space: nowrap;
      font-family: monospace;
    }
    .greek {
      font-size: 1rem;
      color: #334155;
    }
    .translit {
      font-size: 0.8rem;
      color: #94a3b8;
      font-style: italic;
    }
    .gloss {
      flex: 1;
      color: #475569;
      font-size: 0.9rem;
    }
    .toggle-icon {
      color: #94a3b8;
      font-size: 0.75rem;
      transition: transform 0.2s;
      flex-shrink: 0;
    }
    .card.open .toggle-icon { transform: rotate(180deg); }

    /* ── Expanded body ── */
    .card-body {
      display: none;
      border-top: 1px solid #f1f5f9;
      padding: 1rem 1rem 1rem 1.25rem;
      background: #fafafa;
    }
    .card.open .card-body { display: block; }

    .verse-text {
      font-size: 0.95rem;
      line-height: 1.6;
      color: #1e293b;
      margin-bottom: 0.9rem;
      padding: 0.6rem 0.8rem;
      background: #fff;
      border-left: 3px solid #3b82f6;
      border-radius: 0 4px 4px 0;
    }
    .verse-text em { color: #64748b; font-style: normal; font-size: 0.8rem; }

    .lex-grid {
      display: grid;
      grid-template-columns: max-content 1fr;
      gap: 0.35rem 0.75rem;
      font-size: 0.85rem;
    }
    .lex-grid dt { color: #64748b; white-space: nowrap; }
    .lex-grid dd { color: #1e293b; }

    /* ── Empty / loading states ── */
    #no-results    { color: #94a3b8; font-size: 0.9rem; display: none; }
    #ai-no-results { color: #94a3b8; font-size: 0.9rem; display: none; }
    #ai-error      { color: #dc2626; font-size: 0.85rem; display: none; }

    /* ── Passage grouping ── */
    .passage-group { margin-bottom: 0.75rem; }
    .passage-hdr {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.45rem 0.75rem;
      background: #f1f5f9;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      cursor: pointer;
      user-select: none;
      margin-bottom: 0.3rem;
    }
    .passage-hdr:hover { background: #e8eef6; }
    .passage-hdr .p-toggle {
      font-size: 0.65rem;
      color: #94a3b8;
      transition: transform 0.2s;
      flex-shrink: 0;
    }
    .passage-hdr .p-title { font-weight: 600; font-size: 0.875rem; color: #1e3a5f; flex: 1; }
    .passage-hdr .p-count {
      font-size: 0.75rem;
      background: #dbeafe;
      color: #1d4ed8;
      border-radius: 4px;
      padding: 0.1rem 0.45rem;
    }
    .passage-body { padding-left: 0.5rem; }

    /* ── AI section ── */
    .ai-divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 2rem 0 1rem;
      color: #94a3b8;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .ai-divider::before, .ai-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e2e8f0;
    }

    .ai-btn {
      padding: 0.6rem 1.2rem;
      background: #6d28d9;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.95rem;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .ai-btn:hover { background: #7c3aed; }
    .ai-btn:disabled { background: #a78bfa; cursor: default; }

    #ai-explanation {
      margin: 0.75rem 0 0.5rem;
      font-size: 0.82rem;
      color: #6d28d9;
      font-style: italic;
      min-height: 1em;
    }
  </style>
</head>
<body>

<header>
  <h1>Bible Word Study</h1>
  <p>Genesis · Apostolic Bible Polyglot (LXX) · Strong's Greek</p>
</header>

<main>
  <div class="search-row">
    <input id="q" type="search" placeholder="Search English gloss (e.g. spirit, breath, light)" autocomplete="off">
    <button onclick="doSearch()">Search</button>
  </div>
  <div class="options-row">
    <input id="phrase-mode" type="checkbox">
    <label for="phrase-mode">Full phrase search</label>
    <span style="color:#e2e8f0;margin:0 0.25rem">|</span>
    <input id="group-passages" type="checkbox">
    <label for="group-passages">Group by passage</label>
  </div>

  <div id="summary"></div>
  <div id="results"></div>
  <div id="no-results">No matches found.</div>

  <div class="ai-divider">
    <span>or ask a question</span>
  </div>

  <div class="search-row">
    <input id="ai-q" type="search" placeholder='e.g. "where does the divine council appear?" or "find all covenants with Abraham"' autocomplete="off">
    <button class="ai-btn" onclick="doAiSearch()">Ask AI</button>
  </div>

  <div id="ai-explanation"></div>
  <div id="ai-results"></div>
  <div id="ai-no-results">No results found.</div>
  <div id="ai-error"></div>
</main>

<script>
  document.getElementById('q').addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch();
  });

  document.getElementById('ai-q').addEventListener('keydown', e => {
    if (e.key === 'Enter') doAiSearch();
  });

  async function doAiSearch() {
    const q          = document.getElementById('ai-q').value.trim();
    const btn        = document.querySelector('.ai-btn');
    const explEl     = document.getElementById('ai-explanation');
    const resultsEl  = document.getElementById('ai-results');
    const noResults  = document.getElementById('ai-no-results');
    const errorEl    = document.getElementById('ai-error');

    if (!q) return;

    btn.disabled     = true;
    btn.textContent  = 'Thinking…';
    explEl.textContent = '';
    resultsEl.innerHTML = '';
    noResults.style.display = 'none';
    errorEl.style.display   = 'none';
    _lastAiData = null;

    try {
      const res  = await fetch(`/api/ai-search?q=${encodeURIComponent(q)}`);
      const data = await res.json();

      if (data.error) {
        errorEl.textContent    = `Error: ${data.error}`;
        errorEl.style.display  = 'block';
        return;
      }

      explEl.textContent = data.explanation || '';
      _lastAiData = data;
      renderAiResults(data);
    } catch (e) {
      errorEl.textContent   = `Network error: ${e}`;
      errorEl.style.display = 'block';
    } finally {
      btn.disabled    = false;
      btn.textContent = 'Ask AI';
    }
  }

  document.getElementById('phrase-mode').addEventListener('change', () => {
    if (document.getElementById('q').value.trim()) doSearch();
  });

  document.getElementById('group-passages').addEventListener('change', () => {
    if (document.getElementById('q').value.trim()) doSearch();
    if (_lastAiData) renderAiResults(_lastAiData);
  });

  let _lastAiData = null;

  const PASSAGES = [
    { label: 'Creation',                      book: 'Gen', start:  1, end:  2 },
    { label: 'Fall & Cain',                   book: 'Gen', start:  3, end:  4 },
    { label: 'Antediluvian Genealogy',        book: 'Gen', start:  5, end:  5 },
    { label: 'Flood',                         book: 'Gen', start:  6, end:  9 },
    { label: 'Nations & Babel',               book: 'Gen', start: 10, end: 11 },
    { label: "Abraham's Call & Journeys",     book: 'Gen', start: 12, end: 14 },
    { label: 'Covenant of Fire',              book: 'Gen', start: 15, end: 15 },
    { label: 'Hagar & Ishmael',               book: 'Gen', start: 16, end: 16 },
    { label: 'Covenant of Circumcision',      book: 'Gen', start: 17, end: 17 },
    { label: 'Sodom & Gomorrah',              book: 'Gen', start: 18, end: 19 },
    { label: 'Abraham & Abimelech',           book: 'Gen', start: 20, end: 20 },
    { label: 'Isaac & Hagar',                 book: 'Gen', start: 21, end: 21 },
    { label: 'Binding of Isaac',              book: 'Gen', start: 22, end: 22 },
    { label: "Sarah's Burial & Isaac's Wife", book: 'Gen', start: 23, end: 24 },
    { label: 'Jacob & Esau',                  book: 'Gen', start: 25, end: 27 },
    { label: "Jacob's Ladder",                book: 'Gen', start: 28, end: 28 },
    { label: 'Jacob & Laban',                 book: 'Gen', start: 29, end: 31 },
    { label: "Jacob's Return & Dinah",        book: 'Gen', start: 32, end: 36 },
    { label: 'Joseph',                        book: 'Gen', start: 37, end: 50 },
  ];

  function passageLabelFor(book, chapter) {
    const p = PASSAGES.find(p => p.book === book && chapter >= p.start && chapter <= p.end);
    if (p) {
      const ch = p.start === p.end ? p.start : `${p.start}–${p.end}`;
      return `${p.label} (${book} ${ch})`;
    }
    return `${book} ${chapter}`;
  }

  function renderGrouped(results, container, makeCardFn) {
    const groups = new Map();
    const order  = [];
    for (const r of results) {
      const label = passageLabelFor(r.book, r.chapter);
      if (!groups.has(label)) { groups.set(label, []); order.push(label); }
      groups.get(label).push(r);
    }
    for (const label of order) {
      const items   = groups.get(label);
      const section = document.createElement('div');
      section.className = 'passage-group';

      const hdr = document.createElement('div');
      hdr.className = 'passage-hdr';
      hdr.innerHTML = `
        <span class="p-toggle">▼</span>
        <span class="p-title">${label}</span>
        <span class="p-count">${items.length}</span>
      `;

      const body = document.createElement('div');
      body.className = 'passage-body';
      for (const r of items) body.appendChild(makeCardFn(r));

      let open = true;
      hdr.addEventListener('click', () => {
        open = !open;
        body.style.display = open ? '' : 'none';
        hdr.querySelector('.p-toggle').style.transform = open ? '' : 'rotate(-90deg)';
      });

      section.appendChild(hdr);
      section.appendChild(body);
      container.appendChild(section);
    }
  }

  function renderAiResults(data) {
    const grouped   = document.getElementById('group-passages').checked;
    const resultsEl = document.getElementById('ai-results');
    const noResults = document.getElementById('ai-no-results');
    resultsEl.innerHTML = '';
    if (data.total === 0) { noResults.style.display = 'block'; return; }
    noResults.style.display = 'none';
    if (grouped) renderGrouped(data.results, resultsEl, makeVerseCard);
    else for (const r of data.results) resultsEl.appendChild(makeVerseCard(r));
  }

  async function doSearch() {
    const q       = document.getElementById('q').value.trim();
    const phrase  = document.getElementById('phrase-mode').checked ? '1' : '0';
    const grouped = document.getElementById('group-passages').checked;
    const summary   = document.getElementById('summary');
    const resultsEl = document.getElementById('results');
    const noResults = document.getElementById('no-results');

    if (!q) return;

    summary.textContent = 'Searching…';
    resultsEl.innerHTML = '';
    noResults.style.display = 'none';

    const res  = await fetch(`/api/search?q=${encodeURIComponent(q)}&phrase=${phrase}`);
    const data = await res.json();

    if (data.total === 0) {
      summary.textContent = '';
      noResults.style.display = 'block';
      return;
    }

    const occLabel = `${data.total} occurrence${data.total !== 1 ? 's' : ''}`;

    if (grouped) {
      summary.textContent = occLabel;
      renderGrouped(data.results, resultsEl, makeCard);
    } else {
      const shown = data.results.slice(0, 20);
      const more  = data.total - shown.length;
      summary.textContent = occLabel + (more > 0 ? ` · showing first 20 of ${data.total}` : '');
      for (const r of shown) resultsEl.appendChild(makeCard(r));
      if (more > 0) {
        const btn = document.createElement('button');
        btn.textContent = `Show all ${data.total} results`;
        btn.style.cssText = 'margin-top:0.5rem;padding:0.5rem 1rem;background:#f1f5f9;border:1px solid #cbd5e1;border-radius:6px;cursor:pointer;font-size:0.85rem;width:100%';
        btn.onclick = () => {
          for (const r of data.results.slice(20)) resultsEl.appendChild(makeCard(r));
          btn.remove();
          summary.textContent = occLabel;
        };
        resultsEl.appendChild(btn);
      }
    }
  }

  function makeCard(r) {
    const card = document.createElement('div');
    card.className = 'card';

    const lemmaHtml = r.lemma
      ? `<span class="greek">${r.lemma}</span> <span class="translit">${r.translit || ''}</span>`
      : '';

    const header = document.createElement('div');
    header.className = 'card-header';
    header.innerHTML = `
      <span class="ref">${r.ref}</span>
      <span class="strongs-tag">G${r.strongs}</span>
      ${lemmaHtml}
      <span class="gloss">"${r.gloss || ''}"</span>
      <span class="toggle-icon">▼</span>
    `;

    const body = document.createElement('div');
    body.className = 'card-body';
    body.innerHTML = '<div class="verse-text"><em>Loading verse…</em></div>';

    if (r.strongs_def || r.kjv_def || r.derivation) {
      const dl = document.createElement('dl');
      dl.className = 'lex-grid';
      if (r.strongs_def)  dl.innerHTML += `<dt>Definition</dt><dd>${r.strongs_def}</dd>`;
      if (r.kjv_def)      dl.innerHTML += `<dt>KJV gloss</dt><dd>${r.kjv_def}</dd>`;
      if (r.derivation)   dl.innerHTML += `<dt>Derivation</dt><dd>${r.derivation}</dd>`;
      body.appendChild(dl);
    }

    let verseLoaded = false;
    header.addEventListener('click', async () => {
      card.classList.toggle('open');
      if (card.classList.contains('open') && !verseLoaded) {
        verseLoaded = true;
        const vRes  = await fetch(`/api/verse/${encodeURIComponent(r.book)}/${r.chapter}/${r.verse}`);
        const vData = await vRes.json();
        body.querySelector('.verse-text').innerHTML =
          `<em>${r.ref}</em> &nbsp;${vData.text || '(no text)'}`;
      }
    });

    card.appendChild(header);
    card.appendChild(body);
    return card;
  }
  function makeVerseCard(r) {
    const card = document.createElement('div');
    card.className = 'card';

    const wordTags = r.words.map(w => {
      const lemmaHtml = w.lemma
        ? `<span class="greek">${w.lemma}</span> <span class="translit">${w.translit || ''}</span>`
        : '';
      return `<span class="strongs-tag">G${w.strongs}</span>${lemmaHtml ? ' ' + lemmaHtml : ''} <span class="gloss">"${w.gloss || ''}"</span>`;
    }).join('<span style="color:#cbd5e1;margin:0 0.4rem">·</span>');

    const header = document.createElement('div');
    header.className = 'card-header';
    header.style.flexWrap = 'wrap';
    header.innerHTML = `
      <span class="ref">${r.ref}</span>
      ${wordTags}
      <span class="toggle-icon" style="margin-left:auto">▼</span>
    `;

    const body = document.createElement('div');
    body.className = 'card-body';
    body.innerHTML = '<div class="verse-text"><em>Loading verse…</em></div>';

    for (const w of r.words) {
      if (w.strongs_def || w.kjv_def || w.derivation) {
        const dl = document.createElement('dl');
        dl.className = 'lex-grid';
        dl.style.marginTop = '0.6rem';
        if (w.lemma)      dl.innerHTML += `<dt>Lemma</dt><dd>${w.lemma} <em style="color:#94a3b8">${w.translit || ''}</em></dd>`;
        if (w.strongs_def) dl.innerHTML += `<dt>Definition</dt><dd>${w.strongs_def}</dd>`;
        if (w.kjv_def)    dl.innerHTML += `<dt>KJV gloss</dt><dd>${w.kjv_def}</dd>`;
        if (w.derivation) dl.innerHTML += `<dt>Derivation</dt><dd>${w.derivation}</dd>`;
        body.appendChild(dl);
      }
    }

    let verseLoaded = false;
    header.addEventListener('click', async () => {
      card.classList.toggle('open');
      if (card.classList.contains('open') && !verseLoaded) {
        verseLoaded = true;
        const vRes  = await fetch(`/api/verse/${encodeURIComponent(r.book)}/${r.chapter}/${r.verse}`);
        const vData = await vRes.json();
        body.querySelector('.verse-text').innerHTML =
          `<em>${r.ref}</em> &nbsp;${vData.text || '(no text)'}`;
      }
    });

    card.appendChild(header);
    card.appendChild(body);
    return card;
  }
</script>
</body>
</html>
